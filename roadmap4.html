  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f4f4f4; color: #222; }
    h1 { padding: 1rem 1.5rem 0.4rem; font-size: 1.4rem; }
    .summary-bar {
      display: flex; gap: 2rem; padding: 0.3rem 1.5rem 0.8rem;
      font-size: 0.9rem; color: #555;
    }
    .summary-bar strong { color: #222; }
    #chart-container {
      padding: 1rem 1.5rem 0.5rem; background: #fff; border-top: 1px solid #ddd;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    #chart-wrapper {
      min-width: max(100%, 800px);
      height: 320px; position: relative;
    }
    #elevation-chart { width: 100% !important; height: 100% !important; }
    .chart-legend {
      display: flex; flex-wrap: wrap; gap: 1.2rem; align-items: center;
      padding: 0.5rem 1.5rem 0.75rem; background: #fff; font-size: 0.8rem; color: #555;
    }
    .cl-item { display: flex; align-items: center; gap: 0.35rem; }
    .cl-solid  { width: 18px; height: 3px; border-radius: 2px; }
    .cl-dot    { width: 10px; height: 10px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 0 1px #ccc; }
    #stages-table { padding: 1rem 1.5rem 2rem; overflow-x: auto; }
    @media (max-width: 640px) {
      h1 { padding: 0.75rem 1rem 0.3rem; font-size: 1.2rem; }
      .summary-bar { padding: 0.3rem 1rem 0.6rem; gap: 1rem; font-size: 0.82rem; }
      #chart-container { padding: 0.5rem 0.25rem 0.25rem; }
      .chart-legend { padding: 0.4rem 1rem 0.6rem; font-size: 0.75rem; gap: 0.8rem; }
      #stages-table { padding: 0.5rem 0 1.5rem; }
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.86rem; background: #fff; }
    th {
      background: #2c3e50; color: #fff; padding: 0.6rem 0.75rem;
      text-align: left; white-space: nowrap;
    }
    td { padding: 0.5rem 0.75rem; border-bottom: 1px solid #eee; vertical-align: top; }
    tr.cand-row { cursor: pointer; transition: background 0.15s; }
    tr.cand-row:hover { background: #eef6fb; }
    tr.cand-row.active { background: #d5eaf8; }
    .supply-list { font-size: 0.78rem; color: #555; margin-top: 0.25rem; }
    .cat-dot {
      display: inline-block; width: 9px; height: 9px;
      border-radius: 50%; margin-right: 3px; vertical-align: middle;
    }
  </style>
</head>

// ── Elevation chart ───────────────────────────────────────────────────────────
const annotations = {};

// Night POI — solid vertical lines
CANDIDATES.forEach((c, i) => {
  const label = c.commune
    ? [`#${c.index}`, c.commune]
    : [`#${c.index} ${c.name}`];
  annotations[`night${i}`] = {
    type: 'line',
    xMin: c.dist_from_start_km, xMax: c.dist_from_start_km,
    borderColor: c.color, borderWidth: 2,
    label: {
      display: true, content: label, position: 'start',
      font: { size: 9, weight: 'bold' },
      color: c.color, backgroundColor: 'rgba(255,255,255,0.85)',
      padding: { x: 4, y: 2 }, borderRadius: 3,
    },
  };
});

// Supply POI — pastilles colorées (dot on curve + staggered circle above)
const allY     = CHART_DATA.map(d => d.y);
const maxEle   = Math.max(...allY);
const eleRange = maxEle - Math.min(...allY);
const BADGE_LEVELS = [0.18, 0.34, 0.50, 0.66].map(f => maxEle + f * eleRange);
const Y_AXIS_MAX   = maxEle + 0.82 * eleRange;

SUPPLY.forEach((s, i) => {
  const badgeY = BADGE_LEVELS[i % 4];

  // Small dot on the elevation curve
  annotations[`sdot${i}`] = {
    type: 'point',
    xValue: s.dist_km,
    yValue: s.elevation,
    radius: 4,
    backgroundColor: s.color,
    borderColor: '#fff',
    borderWidth: 1.5,
  };

  // Thin stem from dot to badge
  annotations[`sstem${i}`] = {
    type: 'line',
    xMin: s.dist_km, xMax: s.dist_km,
    yMin: s.elevation, yMax: badgeY,
    borderColor: s.color,
    borderWidth: 1,
    borderDash: [2, 3],
  };

  // Circular badge — no text, or '*' if multiple items
  annotations[`sbadge${i}`] = {
    type: 'point',
    xValue: s.dist_km,
    yValue: badgeY,
    radius: 8,
    backgroundColor: s.color,
    borderColor: '#fff',
    borderWidth: 2,
    label: {
      display: s.count > 1,
      content: '*',
      color: '#fff',
      font: { size: 11, weight: 'bold' },
      position: 'center',
    },
  };
});

  type: 'line',
  data: {
    datasets: [{
      label: 'Altitude (m)',
      data: CHART_DATA,
      borderColor: '#3498db',
      backgroundColor: 'rgba(52,152,219,0.12)',
      borderWidth: 1.5, pointRadius: 0, fill: true, tension: 0.3,
    }],
  },
  options: {
    animation: false, responsive: true, maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    scales: {
      x: { type: 'linear', title: { display: true, text: 'Distance (km)' }, ticks: { maxTicksLimit: 12 } },
      y: { title: { display: true, text: 'Altitude (m)' }, max: Y_AXIS_MAX },
    },
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          title: items => `${items[0].parsed.x.toFixed(1)} km`,
          label: items => `${items.parsed.y} m`,
        },
      },
      annotation: { annotations },
    },
  },
});

const legendEl = document.getElementById('chart-legend');
const nightEntries = [
  ['camping', 'Camping'], ['chambres', 'Chambres/Hôtel'], ['shelter', 'Abri/Refuge'],
];
const supplyEntries = [
  ['water', 'Eau'], ['toilets', 'Toilettes'], ['shop', 'Épicerie/Shop'],
  ['restau', 'Restaurant'], ['bank', 'Banque/DAB'],
];
for (const [cat, label] of nightEntries) {
  const c = NIGHT_COLORS[cat] || '#888';
  legendEl.insertAdjacentHTML('beforeend',
    `<span class="cl-item"><span class="cl-solid" style="background:${c}"></span>${label}</span>`);
}
for (const [cat, label] of supplyEntries) {
  const c = SUPPLY_COLORS[cat] || '#888';
  legendEl.insertAdjacentHTML('beforeend',
    `<span class="cl-item"><span class="cl-dot" style="background:${c}"></span>${label}</span>`);
}

// ── Candidates table ──────────────────────────────────────────────────────────
const tbody = document.getElementById('cand-tbody');
let activeRow = null;

CANDIDATES.forEach((c, i) => {
  const supplyHtml = c.supply_stops.length
    ? `<div class="supply-list">${c.supply_stops.map(s =>
        `<span class="cat-dot" style="background:${s.color}"></span>${s.name} (${s.dist_km} km)`
      ).join(' · ')}</div>`
    : '<span style="color:#bbb">—</span>';

  const tr = document.createElement('tr');
  tr.className = 'cand-row';
  tr.innerHTML = `
    <td><strong style="color:${c.color}">#${c.index}</strong></td>
    <td>
      <span class="cat-dot" style="background:${c.color}"></span>
      <strong>${c.name}</strong>
      ${c.commune ? `<span style="color:#888;font-size:.82em"> — ${c.commune}</span>` : ''}

    </td>
    <td>${c.dist_from_start_km}</td>
    <td>${c.dist_from_prev_km}</td>
    <td>+${c.d_plus_cumul.toLocaleString()} m</td>
    <td>-${c.d_minus_cumul.toLocaleString()} m</td>
    <td>${supplyHtml}</td>
  `;
  tr.addEventListener('click', () => {
    if (activeRow) activeRow.classList.remove('active');
    tr.classList.add('active');
    activeRow = tr;
  });
  tbody.appendChild(tr);
});
